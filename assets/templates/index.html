{% extends 'base.html' %}

{% block content %}
    <div class="page">
        <h1 class="item">{% block title %} IT 4320 Dashboard {% endblock %}</h1>
        
        <div>
            <p>Welcome to the IT 4320 Dashboard. Use the select box to choose whether make a reservation or log in as administrator.</p>
            <p>Choose Menu Option:</p>

            <form method="POST" action="{{ url_for('main.index') }}">

                <select required name="menu_option">
                    <option value="">Choose an Option</option>
                    <option value="admin">Admin Log In</option>
                    <option value="reservations">Reserve a Seat</option>
                </select>
                <button type="submit">Submit</button>

            </form>
                
            
        </div>
    </div>

{% endblock %}
